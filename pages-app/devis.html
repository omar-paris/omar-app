<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Devis — Omar App</title><link rel="stylesheet" href="/assets/styles.css">
<style>
.grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.fam{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;margin:18px 0 8px}
.prod{border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.1s}
.prod:hover{border-color:#93c5fd}.prod.sel{border-color:#2563eb;background:#eff6ff}
.prod h3{margin:0 0 2px;font-size:15px}.prod .pitch{font-size:13px;color:#6b7280;margin:0 0 6px}
.prod .price{font-size:14px;font-weight:600;color:#111827}.prod .inc{font-size:12px;color:#6b7280;margin-top:6px}
.cart{position:sticky;top:12px;border:1px solid #e5e7eb;border-radius:12px;padding:16px}
.cart h2{margin:0 0 10px;font-size:15px}
.line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f3f4f6}
.tot{display:flex;justify-content:space-between;font-weight:700;margin-top:10px;font-size:15px}
.cart button{width:100%;margin-top:8px;padding:10px;border:0;border-radius:10px;font-size:14px;cursor:pointer}
.buy{background:#2563eb;color:#fff}.save{background:#f3f4f6;color:#111827}.share{background:#f3f4f6;color:#111827}
.msg{font-size:12px;margin-top:8px;padding:8px;border-radius:8px}
.saved{font-size:11px;color:#16a34a;margin-top:6px;min-height:14px}
</style></head><body>
<header><div class="bar"><div><div class="brand">Omar App · app.omar.paris</div><div class="meta">Devis · enregistré en continu</div></div>
<nav class="nav"><a href="/">Accueil</a><a class="active" href="/devis/">Devis</a><a href="/onboarding/">Onboarding</a><a href="/sav/">SAV</a></nav></div></header>
<main>
<h1 class="h1" style="margin-bottom:4px">Composez votre solution</h1>
<p class="summary" style="margin-bottom:8px">Votre sélection est sauvegardée automatiquement — vous pouvez fermer et reprendre via votre lien. Rien n'est payé sans votre accord.</p>
<div class="grid"><div id="cat"></div>
<aside class="cart"><h2>Votre devis</h2><div id="lines"><div style="font-size:13px;color:#9ca3af">Aucune sélection</div></div>
<div class="tot"><span>Mensuel</span><span id="tm">0 &euro;</span></div>
<div class="tot" style="font-weight:500;font-size:13px"><span>Installation</span><span id="tu">0 &euro;</span></div>
<button class="save" onclick="saveDevis(true)">Sauvegarder &amp; copier mon lien</button>
<button class="buy" onclick="buy()">Acheter</button>
<div class="saved" id="saved"></div><div id="msg"></div></aside></div></main>
<script>
let CAT=[], sel=new Set(), devisId=null, saveTimer=null;
const FAM={formule:"Formules",module:"Modules à la carte",prestation:"Prestations"};
const params=new URLSearchParams(location.search);
async function load(){
  const r=await fetch("/api/catalog"); CAT=(await r.json()).products;
  // reprise : si ?id= dans l'URL, recharger le devis existant
  const rid=params.get("id");
  if(rid){ try{ const dr=await fetch("/api/devis/"+rid); if(dr.ok){ const dv=(await dr.json()).devis;
    devisId=dv.id; sel=new Set(dv.lignes.map(l=>l.id));
    if(dv.statut==="achete"){ document.getElementById("saved").textContent="✓ Ce devis a déjà été acheté le "+(dv.paye_le||"").slice(0,10); }
  } }catch(e){} }
  if(params.get("paid")){ document.getElementById("msg").className="msg"; document.getElementById("msg").style.background="#dcfce7"; document.getElementById("msg").style.color="#166534"; document.getElementById("msg").textContent="✓ Paiement reçu — merci ! Votre configuration va démarrer."; }
  render();
}
function render(){
  let h=""; for(const fam of ["formule","module","prestation"]){
    const items=CAT.filter(p=>p.famille===fam); if(!items.length)continue;
    h+=`<div class="fam">${FAM[fam]}</div>`;
    for(const p of items){ const pm=p.prix_mensuel, pu=p.prix_unique;
      const price=pm!=null?`${pm} €/mois`:(pu!=null?`${pu} € une fois`:"sur devis");
      const inc=p.inclus?`<div class="inc">${(Array.isArray(p.inclus)?p.inclus:[p.inclus]).join(" · ")}</div>`:"";
      h+=`<div class="prod ${sel.has(p.id)?'sel':''}" onclick="tog('${p.id}')"><h3>${p.label}</h3><div class="pitch">${p.pitch||''}</div><div class="price">${price}</div>${inc}</div>`;
    }}
  document.getElementById("cat").innerHTML=h; cart();
}
function tog(id){ sel.has(id)?sel.delete(id):sel.add(id); render(); autosave(); }
function cart(){
  const items=CAT.filter(p=>sel.has(p.id)); let tm=0,tu=0;
  document.getElementById("lines").innerHTML=items.length?items.map(p=>{tm+=p.prix_mensuel||0;tu+=p.prix_unique||0;
    const v=p.prix_mensuel!=null?`${p.prix_mensuel} €/m`:(p.prix_unique!=null?`${p.prix_unique} €`:"—");
    return `<div class="line"><span>${p.label}</span><span>${v}</span></div>`;}).join(""):'<div style="font-size:13px;color:#9ca3af">Aucune sélection</div>';
  document.getElementById("tm").textContent=tm+" €"; document.getElementById("tu").textContent=tu+" €";
}
function msg(t,ok){const m=document.getElementById("msg");m.className="msg";m.style.background=ok?"#dcfce7":"#fef3c7";m.style.color=ok?"#166534":"#92400e";m.textContent=t;}
function autosave(){ // sauvegarde continue (débounce 800ms)
  clearTimeout(saveTimer); document.getElementById("saved").textContent="…";
  saveTimer=setTimeout(()=>saveDevis(false), 800);
}
async function saveDevis(showLink){
  if(!sel.size){ document.getElementById("saved").textContent=""; if(showLink)msg("Choisissez au moins un produit.",false); return null; }
  const r=await fetch("/api/devis",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({items:[...sel],devis_id:devisId})});
  const d=await r.json();
  if(r.ok){ devisId=d.devis.id;
    const url=location.origin+"/devis/?id="+devisId; history.replaceState(null,"","/devis/?id="+devisId);
    document.getElementById("saved").textContent="✓ enregistré";
    if(showLink){ navigator.clipboard&&navigator.clipboard.writeText(url); msg("Lien copié : "+url+" — reprenez votre devis quand vous voulez.",true); }
    return devisId;
  } return null;
}
async function buy(){ const id=await saveDevis(false); if(!id){msg("Choisissez au moins un produit.",false);return;}
  const r=await fetch("/api/checkout",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({devis_id:id})});
  const d=await r.json();
  if(r.status===503){ msg("💳 "+d.message+" Votre devis ("+d.total_mensuel_eur+" €/mois) est sauvegardé.",true); }
  else if(r.ok&&d.checkout_url){ location.href=d.checkout_url; }
  else { msg("Paiement indisponible ("+(d.error||r.status)+")",false); }
}
load();
</script></body></html>
